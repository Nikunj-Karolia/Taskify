services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - 80:5000
    expose:
      - 80
    depends_on:
      - db
  db:
    image: postgres
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - 5432
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d/:ro
      - ./db/data:/var/lib/postgresql